<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论留言表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: "Microsoft Yahei", sans-serif;
            box-sizing: border-box;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff 0%, #fff9f0 100%);
        }

        .page.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: scale(0.8);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: 0.2s;
        }

        @keyframes popIn {
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-title {
            color: #333333;
            font-size: 22px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
            background-color: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #87E8DE;
            box-shadow: 0 0 0 3px rgba(135, 232, 222, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 15px 0;
            background-color: #87E8DE;
            color: #333333;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: #5CDBD3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .success-message {
            display: none;
            padding: 20px 0;
        }

        .success-message h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .success-message p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            width: 80%;
            padding: 15px 0;
            background-color: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .error-message {
            display: none;
            color: #d32f2f;
            padding: 15px;
            border-radius: 8px;
            background-color: #ffebee;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="page active" id="formPage">
        <div class="container">
            <div id="formContainer">
                <h2 class="form-title">留下你的评论</h2>
                <div class="error-message" id="errorMessage"></div>
                <form id="commentForm">
                    
                    <div class="form-group">
                        <label for="nickname">B站昵称</label>
                        <input type="text" id="nickname" name="nickname" placeholder="怎么称呼你？" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender" name="gender">
                            <option value="保密">保密/不透露</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="happy">最近有什么开心的事吗？</label>
                        <textarea id="happy" name="happy" placeholder="分享一件让你嘴角上扬的小事吧~"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="comment">评论内容</label>
                        <textarea id="comment" name="comment" placeholder="写下你想评论的留言...说不定在读评论的时候会读到哦〜" required></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">提交评论</button>
                    <button type="reset">重置</button>
                </form>
            </div>

            <div class="success-message" id="successMessage">
                <h2>🎉 提交成功！</h2>
                <p>感谢你对绿钻的支持！<br>你的评论我会认真的观看~</p>
                <a href="index.html" class="back-btn">返回上一页</a>
            </div>
        </div>
    </div>

<script>
const form = document.getElementById('commentForm');
const formContainer = document.getElementById('formContainer');
const successMessage = document.getElementById('successMessage');
const errorMessage = document.getElementById('errorMessage');

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Get form data
    const nickname = document.getElementById('nickname').value.trim();
    const gender = document.getElementById('gender').value;
    const happy = document.getElementById('happy').value.trim();
    const comment = document.getElementById('comment').value.trim();
    
    // Validation
    if (!nickname || !comment) {
        showError('请填写昵称和评论内容');
        return;
    }
    
    try {
        // Submit to Tally using fetch API with proper field mapping
        const response = await fetch('https://tally.so/api/v1/forms/q4NO1Y/responses', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                "fields": [
                    {
                        "key": "q4NO1Y_3_short_text",
                        "value": nickname
                    },
                    {
                        "key": "q4NO1Y_4_dropdown",
                        "value": gender
                    },
                    {
                        "key": "q4NO1Y_5_long_text",
                        "value": happy
                    },
                    {
                        "key": "q4NO1Y_6_long_text",
                        "value": comment
                    }
                ]
            })
        });
        
        if (response.ok) {
            // Show success message
            formContainer.style.display = 'none';
            successMessage.style.display = 'block';
        } else {
            const errorData = await response.json();
            showError('提交失败，请重试: ' + (errorData.message || response.statusText));
        }
    } catch (error) {
        console.error('提交错误:', error);
        showError('提交出错，请检查网络连接后重试');
    }
});

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.style.display = 'block';
    setTimeout(() => {
        errorMessage.style.display = 'none';
    }, 5000);
}
</script>

</body>
</html>
